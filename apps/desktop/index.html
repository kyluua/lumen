<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Lumen - A safe, polished, customizable Minecraft launcher" />
    <meta name="theme-color" content="#7c3aed" />
    <title>Lumen Launcher</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Georgia:ital,wght@0,400;0,700;1,400;1,700&display=swap" rel="stylesheet" />
    <style>
      *, *::before, *::after {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html, body, #root {
        height: 100%;
        width: 100%;
        overflow: hidden;
        background: #0a0a1a;
        color: #f1f5f9;
        font-family: Georgia, 'Times New Roman', serif;
      }
      /* Splash Screen */
      .lumen-splash {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        z-index: 9999;
        background: radial-gradient(ellipse at 50% 50%, #1a1035 0%, #0a0a1a 70%);
        animation: splashFadeOut 0.8s ease-out 3s forwards;
        pointer-events: none;
      }
      .lumen-splash::before {
        content: '';
        position: absolute;
        inset: 0;
        background:
          radial-gradient(2px 2px at 20% 30%, rgba(255,255,255,0.9), transparent),
          radial-gradient(2px 2px at 40% 60%, rgba(255,255,255,0.7), transparent),
          radial-gradient(1px 1px at 60% 20%, rgba(255,255,255,0.8), transparent),
          radial-gradient(2px 2px at 75% 50%, rgba(255,255,255,0.6), transparent),
          radial-gradient(1px 1px at 85% 70%, rgba(255,255,255,0.7), transparent),
          radial-gradient(2px 2px at 30% 80%, rgba(255,255,255,0.5), transparent),
          radial-gradient(1px 1px at 10% 45%, rgba(255,255,255,0.8), transparent),
          radial-gradient(2px 2px at 55% 10%, rgba(255,255,255,0.6), transparent);
        animation: twinkle 2s ease-in-out infinite;
      }
      .lumen-splash-title {
        font-family: Georgia, serif;
        font-size: 4rem;
        font-weight: 700;
        font-style: italic;
        background: linear-gradient(135deg, #a78bfa 0%, #7c3aed 30%, #22d3ee 70%, #a78bfa 100%);
        background-size: 200% 200%;
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        animation: gradientShift 3s ease-in-out infinite, titleFadeIn 0.8s ease-out 0.2s both;
        position: relative;
        z-index: 1;
      }
      .lumen-splash-subtitle {
        font-family: Georgia, serif;
        font-size: 1.25rem;
        font-style: italic;
        color: #94a3b8;
        margin-top: 1rem;
        animation: subtitleFadeIn 0.8s ease-out 0.8s both;
        position: relative;
        z-index: 1;
      }
      .lumen-splash-spinner {
        width: 40px;
        height: 40px;
        border: 3px solid rgba(167, 139, 250, 0.2);
        border-top-color: #a78bfa;
        border-radius: 50%;
        margin-top: 2rem;
        animation: spin 1s linear infinite, spinnerFadeIn 0.8s ease-out 1.2s both;
        position: relative;
        z-index: 1;
      }
      @keyframes splashFadeOut {
        0% { opacity: 1; }
        80% { opacity: 0; }
        100% { opacity: 0; visibility: hidden; }
      }
      @keyframes titleFadeIn {
        from { opacity: 0; transform: translateY(-20px); }
        to { opacity: 1; transform: translateY(0); }
      }
      @keyframes subtitleFadeIn {
        from { opacity: 0; transform: translateY(10px); }
        to { opacity: 1; transform: translateY(0); }
      }
      @keyframes spinnerFadeIn {
        from { opacity: 0; }
        to { opacity: 1; }
      }
      @keyframes gradientShift {
        0%, 100% { background-position: 0% 50%; }
        50% { background-position: 100% 50%; }
      }
      @keyframes twinkle {
        0%, 100% { opacity: 0.7; }
        50% { opacity: 1; }
      }
      @keyframes spin {
        to { transform: rotate(360deg); }
      }
    </style>
  </head>
  <body>
    <!-- Opening Animation Splash -->
    <div class="lumen-splash" id="lumen-splash">
      <h1 class="lumen-splash-title">Lumen</h1>
      <p class="lumen-splash-subtitle">Thank you for using Lumen — kyluua</p>
      <div class="lumen-splash-spinner"></div>
    </div>

    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
