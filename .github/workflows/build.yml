name: Build Lumen JavaFX

on:
  workflow_dispatch:
  push:
    branches: [main]
    tags: ['v*']

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
      - name: Build
        run: .\gradlew.bat build installDist
      - name: Upload distribution
        uses: actions/upload-artifact@v4
        with:
          name: lumen-javafx-dist
          path: build/install/lumen/**
